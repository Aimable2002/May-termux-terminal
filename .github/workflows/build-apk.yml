name: Build APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: List available Android SDK packages
        run: |
          echo "=== INSTALLED PACKAGES ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed || true
          echo ""
          echo "=== AVAILABLE PACKAGES ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list | head -100 || true
      
      - name: Install build tools and NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0" "platforms;android-35" "ndk;29.0.14206865" || true
      
      - name: Make gradlew executable
        run: chmod +x android/termux-apps/gradlew
      
      - name: Build APK (Debug)
        run: |
          cd android/termux-apps
          ./gradlew assembleDebug --stacktrace -v
      
      - name: List build outputs
        if: always()
        run: find android/termux-apps -name "*.apk" -type f
      
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: termux-app-debug
          path: android/termux-apps/termux-app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: android/termux-apps/termux-app/build/outputs/apk/debug/app-debug.apk
          tag_name: v${{ github.run_number }}
          body: "Debug APK built from commit ${{ github.sha }}"
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
