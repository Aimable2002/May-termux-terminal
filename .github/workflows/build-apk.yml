name: Build APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-37 build-tools;37.0.0 ndk;29.0.0'
      
      - name: Make gradlew executable
        run: chmod +x android/termux-apps/gradlew
      
      - name: Build APK (Debug)
        run: |
          cd android/termux-apps
          ./gradlew assembleDebug --stacktrace -v
      
      - name: List build outputs
        if: always()
        run: find android/termux-apps -name "*.apk" -type f
      
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: termux-app-debug
          path: android/termux-apps/termux-app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: android/termux-apps/termux-app/build/outputs/apk/debug/app-debug.apk
          tag_name: v${{ github.run_number }}
          body: "Debug APK built from commit ${{ github.sha }}"
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
