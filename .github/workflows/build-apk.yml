name: Build APK - Find Location

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Fix gradlew permissions
        run: chmod +x android/termux-apps/gradlew
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build APK (Clean)
        run: |
          cd android/termux-apps
          ./gradlew clean assembleDebug
      
      - name: Find and display ALL APK files with full details
        run: |
          echo "=========================================="
          echo "SEARCHING FOR ALL APK FILES"
          echo "=========================================="
          echo ""
          find android/termux-apps -name "*.apk" -type f -exec ls -lh {} \;
          echo ""
          echo "=========================================="
          echo "FULL PATHS TO APK FILES"
          echo "=========================================="
          echo ""
          find android/termux-apps -name "*.apk" -type f
          echo ""
          echo "=========================================="
          echo "TREE VIEW OF BUILD/OUTPUTS"
          echo "=========================================="
          echo ""
          find android/termux-apps/termux-app/build/outputs -type f 2>/dev/null | sort
          echo ""
          echo "=========================================="
          echo "APK FILE INFO"
          echo "=========================================="
          echo ""
          find android/termux-apps -name "*.apk" -type f | while read apk; do
            echo "APK: $apk"
            echo "Size: $(ls -lh "$apk" | awk '{print $5}')"
            echo "Path: $(realpath "$apk")"
            echo ""
          done
