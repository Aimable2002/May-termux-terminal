name: Build APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-37"
          sdkmanager "ndk;29.0.0"
          sdkmanager "build-tools;37.0.0"
      
      - name: Make gradlew executable
        run: chmod +x android/termux-apps/gradlew
      
      - name: Build APK (Debug)
        run: |
          cd android/termux-apps
          ./gradlew assembleDebug
      
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: termux-app-debug
          path: android/termux-apps/termux-app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: android/termux-apps/termux-app/build/outputs/apk/debug/app-debug.apk
          tag_name: v${{ github.run_number }}
          body: "Debug APK built from commit ${{ github.sha }}"
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}